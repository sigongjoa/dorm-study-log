<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기숙사 학습 다이어리</title>

  <!--
    Content Security Policy:
    - Supabase URL과 일치하도록 connect-src를 수정하세요
    - 예: https://abcdefgh.supabase.co
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net 'unsafe-inline';
    style-src   'self' https://cdn.tailwindcss.com https://fonts.googleapis.com 'unsafe-inline';
    font-src    'self' https://fonts.gstatic.com;
    img-src     'self' data: blob: https://*.supabase.co https://placehold.co;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co;
  " />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    .screen { display: none; }
    .screen.active { display: block; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    textarea:focus, input:focus, select:focus { outline: none; }
    .image-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    /* 모바일 탭 하이라이트 제거 */
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ============================
     1. 로그인
============================= -->
<div id="screen-login" class="screen active fade-in max-w-sm mx-auto px-6 py-16">
  <div class="text-center mb-10">
    <div class="text-4xl mb-3">📚</div>
    <h1 class="text-2xl font-bold text-gray-900">학습 다이어리</h1>
    <p class="text-gray-400 text-sm mt-1">기숙사 수학 학습 기록</p>
  </div>
  <div class="space-y-3">
    <input
      id="login-email"
      type="email"
      placeholder="이메일"
      autocomplete="email"
      class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm"
      onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()"
    />
    <input
      id="login-password"
      type="password"
      placeholder="비밀번호"
      autocomplete="current-password"
      class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm"
      onkeydown="if(event.key==='Enter')login()"
    />
    <button
      id="login-btn"
      onclick="login()"
      class="w-full py-3 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-semibold rounded-xl text-sm transition"
    >
      로그인
    </button>
  </div>
  <p class="text-center text-xs text-gray-400 mt-8">
    계정이 없으면 선생님에게 문의하세요.
  </p>
</div>

<!-- ============================
     2. 학생 홈 (내 기록 피드)
============================= -->
<div id="screen-student-home" class="screen fade-in max-w-sm mx-auto">
  <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center justify-between z-10">
    <div>
      <p class="text-xs text-gray-400">안녕하세요</p>
      <h2 id="student-name" class="text-lg font-bold text-gray-900">님의 기록</h2>
    </div>
    <div class="flex items-center gap-2">
      <button
        onclick="showStudentWrite()"
        class="bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition"
      >
        + 기록
      </button>
      <button
        onclick="logout()"
        class="text-gray-400 text-xs px-2 py-2 rounded-xl hover:bg-gray-100 transition"
      >
        로그아웃
      </button>
    </div>
  </div>

  <div id="student-log-list" class="px-5 py-4 space-y-4 pb-10">
    <div class="text-center py-10 text-gray-400 text-sm">불러오는 중...</div>
  </div>
</div>

<!-- ============================
     3. 학생 기록 작성
============================= -->
<div id="screen-student-write" class="screen fade-in max-w-sm mx-auto">
  <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center gap-3 z-10">
    <button onclick="loadStudentHome()" class="text-gray-400 text-xl leading-none">←</button>
    <h2 class="text-lg font-bold text-gray-900">오늘의 기록</h2>
  </div>

  <div class="px-5 py-5 space-y-5 pb-10">
    <div id="write-date" class="text-sm text-gray-400"></div>

    <div>
      <label class="text-sm font-medium text-gray-700 block mb-2">오늘 뭐 공부했어요?</label>
      <textarea
        id="log-text"
        rows="7"
        maxlength="5000"
        placeholder="자유롭게 써줘요.
예) 오늘 수열 극한 공부했는데 샌드위치 정리가 어려웠음.
    교재 p.134 3번 문제 계속 틀림..."
        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm leading-relaxed resize-none focus:border-blue-400 transition"
      ></textarea>
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700 block mb-2">
        사진 첨부 <span class="text-gray-400 font-normal">(선택, 최대 10MB/장)</span>
      </label>
      <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-gray-200 rounded-xl cursor-pointer hover:border-blue-300 hover:bg-blue-50 transition">
        <span class="text-2xl mb-1">📷</span>
        <span class="text-xs text-gray-400">풀이 노트, 오답 사진 등</span>
        <input
          type="file"
          accept="image/jpeg,image/png,image/webp,image/gif,image/heic"
          multiple
          class="hidden"
          onchange="previewImages(this)"
        />
      </label>
      <div id="preview-container" class="image-preview"></div>
    </div>

    <button
      id="submit-log-btn"
      onclick="submitLog()"
      class="w-full py-3.5 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-semibold rounded-xl text-sm transition"
    >
      기록 저장하기
    </button>
  </div>
</div>

<!-- ============================
     4. 학생 기록 상세 (코멘트 포함)
============================= -->
<div id="screen-student-detail" class="screen fade-in max-w-sm mx-auto">
  <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center gap-3 z-10">
    <button onclick="loadStudentHome()" class="text-gray-400 text-xl leading-none">←</button>
    <h2 id="detail-date" class="text-base font-bold text-gray-900"></h2>
  </div>

  <div class="px-5 py-5 space-y-5 pb-10">
    <div class="bg-white rounded-2xl border border-gray-100 p-4 shadow-sm">
      <p class="text-xs text-gray-400 mb-2">내 기록</p>
      <p id="detail-content" class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap"></p>
      <div id="detail-images" class="flex flex-wrap gap-2 mt-3"></div>
    </div>

    <div id="detail-comment">
      <p class="text-xs text-gray-400 text-center py-6">코멘트를 불러오는 중...</p>
    </div>
  </div>
</div>

<!-- ============================
     5. 선생님 피드
============================= -->
<div id="screen-teacher-feed" class="screen fade-in max-w-sm mx-auto">
  <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 z-10">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-lg font-bold text-gray-900">학습 피드</h2>
      <div class="flex gap-2">
        <button
          onclick="loadReportScreen()"
          class="text-xs text-gray-500 border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-gray-50 transition"
        >
          리포트
        </button>
        <button
          onclick="logout()"
          class="text-xs text-gray-400 px-2 py-1.5 rounded-lg hover:bg-gray-100 transition"
        >
          로그아웃
        </button>
      </div>
    </div>
    <div id="student-filter" class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide"></div>
  </div>

  <div id="teacher-feed-list" class="px-5 py-4 space-y-4 pb-10">
    <div class="text-center py-10 text-gray-400 text-sm">불러오는 중...</div>
  </div>
</div>

<!-- ============================
     6. 선생님 - 기록 상세 + 코멘트 작성
============================= -->
<div id="screen-teacher-detail" class="screen fade-in max-w-sm mx-auto">
  <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center gap-3 z-10">
    <button onclick="loadTeacherFeed()" class="text-gray-400 text-xl leading-none">←</button>
    <div>
      <h2 id="teacher-detail-header" class="text-base font-bold text-gray-900"></h2>
      <p class="text-xs text-gray-400">기록 상세</p>
    </div>
  </div>

  <div class="px-5 py-5 space-y-5 pb-10">
    <div class="bg-gray-50 rounded-2xl p-4">
      <p class="text-xs text-gray-400 mb-2">학생 기록</p>
      <p id="teacher-detail-content" class="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap"></p>
      <div id="teacher-detail-images" class="flex flex-wrap gap-2 mt-3"></div>
    </div>

    <div>
      <p class="text-sm font-medium text-gray-700 mb-2">코멘트 작성</p>
      <textarea
        id="comment-text"
        rows="5"
        maxlength="2000"
        placeholder="학생에게 피드백을 남겨주세요."
        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm leading-relaxed resize-none focus:border-blue-400 transition"
      ></textarea>
      <button
        id="submit-comment-btn"
        onclick="submitComment()"
        class="w-full mt-2 py-3 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white font-semibold rounded-xl text-sm transition"
      >
        코멘트 전송
      </button>
    </div>
  </div>
</div>

<!-- ============================
     7. 리포트 생성
============================= -->
<div id="screen-teacher-report" class="screen fade-in max-w-sm mx-auto">
  <div class="sticky top-0 bg-white border-b border-gray-100 px-5 py-4 flex items-center gap-3 z-10">
    <button onclick="loadTeacherFeed()" class="text-gray-400 text-xl leading-none">←</button>
    <h2 class="text-lg font-bold text-gray-900">리포트 생성</h2>
  </div>

  <div class="px-5 py-5 space-y-5 pb-10">
    <div>
      <label class="text-sm font-medium text-gray-700 block mb-2">학생 선택</label>
      <select
        id="report-student-select"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white text-sm focus:border-blue-400 transition"
      >
        <option value="">학생 선택...</option>
      </select>
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700 block mb-2">기간</label>
      <div class="flex gap-2 items-center">
        <input
          id="report-start"
          type="date"
          class="flex-1 px-3 py-3 rounded-xl border border-gray-200 bg-white text-sm focus:border-blue-400 transition"
        />
        <span class="text-gray-400 text-sm">~</span>
        <input
          id="report-end"
          type="date"
          class="flex-1 px-3 py-3 rounded-xl border border-gray-200 bg-white text-sm focus:border-blue-400 transition"
        />
      </div>
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700 block mb-2">포함 내용</label>
      <div class="space-y-2">
        <label class="flex items-center gap-3 cursor-pointer">
          <input id="include-content" type="checkbox" checked class="w-4 h-4 accent-blue-500" />
          <span class="text-sm text-gray-700">학생 기록 전문</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input id="include-comment" type="checkbox" checked class="w-4 h-4 accent-blue-500" />
          <span class="text-sm text-gray-700">선생님 코멘트</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input id="include-images" type="checkbox" checked class="w-4 h-4 accent-blue-500" />
          <span class="text-sm text-gray-700">첨부 이미지</span>
        </label>
      </div>
    </div>

    <button
      id="generate-report-btn"
      onclick="generateReport()"
      class="w-full py-3.5 bg-gray-900 hover:bg-black active:bg-gray-800 text-white font-semibold rounded-xl text-sm transition"
    >
      PDF 리포트 생성
    </button>

    <div class="bg-blue-50 rounded-xl p-4 text-xs text-blue-700 leading-relaxed">
      📄 리포트가 새 창에서 열립니다.<br>
      <strong>Ctrl+P</strong> (Mac: ⌘+P) → 대상: <strong>PDF로 저장</strong>
    </div>
  </div>
</div>

<!-- ============================
     이미지 전체화면 오버레이
============================= -->
<div
  id="image-overlay"
  class="hidden fixed inset-0 bg-black bg-opacity-85 z-50 flex items-center justify-center p-4"
  onclick="closeImageOverlay()"
>
  <img
    id="overlay-img"
    src=""
    alt="첨부 이미지"
    class="max-w-full max-h-full rounded-xl object-contain select-none"
    onclick="event.stopPropagation()"
  />
  <button
    onclick="closeImageOverlay()"
    class="absolute top-4 right-4 text-white text-2xl w-10 h-10 flex items-center justify-center bg-black bg-opacity-40 rounded-full hover:bg-opacity-60 transition"
    aria-label="닫기"
  >
    ✕
  </button>
</div>

<!-- 토스트 알림 -->
<div
  id="toast"
  class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-5 py-3 rounded-full shadow-lg z-50 whitespace-nowrap"
></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
